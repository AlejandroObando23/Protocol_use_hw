<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edison's Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Computer Store </h1>
            <p>Computer Store </p>
        </header>

        <main>
            <div class="summary">
                <div class="stat-box">
                    <span>Total Customers</span>
                    <strong id="total-customers">-</strong>
                </div>
                <div class="stat-box">
                    <span>Total Revenue</span>
                    <strong id="total-revenue">-</strong>
                </div>
            </div>

            <div class="add-customer-card">
                <h2>Add New Customer</h2>
                <form id="add-form" class="customer-form">
                    <div class="form-group">
                        <label for="add-id">ID</label>
                        <input type="number" id="add-id" required>
                    </div>
                    <div class="form-group">
                        <label for="add-name">Name</label>
                        <input type="text" id="add-name" required>
                    </div>
                    <div class="form-group">
                        <label for="add-age">Age</label>
                        <input type="number" id="add-age" required>
                    </div>
                    <div class="form-group">
                        <label for="add-spent">Money Spent ($)</label>
                        <input type="number" id="add-spent" required step="0.01">
                    </div>
                    <button type="submit" id="add-submit-btn">Add Customer</button>
                </form>
            </div>

            <div class="search-area">
                <select id="search-type">
                    <option value="name">Name</option>
                    <option value="age">Age</option>
                </select>
                <input type="text" id="search-input" placeholder="Search...">
                <button id="search-btn">Search</button>
                <button id="clear-btn" class="secondary">Clear</button>
            </div>

            <div id="search-results" class="search-results hidden"></div>

            <div class="table-container">
                <div class="table-header">
                    <h2>Customers</h2>
                    <button id="refresh-btn" class="secondary">Refresh</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Spent</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customers-body">
                        <tr>
                            <td colspan="4" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Edit Customer</h2>
            <form id="edit-form" class="customer-form modal-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-name">Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-age">Age</label>
                    <input type="number" id="edit-age" required>
                </div>
                <div class="form-group">
                    <label for="edit-spent">Money Spent ($)</label>
                    <input type="number" id="edit-spent" required step="0.01">
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-edit-btn" class="secondary">Cancel</button>
                    <button type="submit" id="save-edit-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
